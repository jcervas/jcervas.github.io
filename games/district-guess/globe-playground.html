<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tiled globe loader — playground</title>
<style>
  :root{ --red:#C41230; --iron:#6D6E71; --steel:#E0E0E0; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:#f0efed; color:var(--iron);
    font:14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .page{ max-width:920px; margin:0 auto; padding:2rem 1.25rem 4rem; }
  h1{ font-size:18px; font-weight:600; color:#000; margin:0 0 1.5rem; }
  .grid{ display:grid; grid-template-columns:320px 1fr; gap:2rem; align-items:start; }
  @media (max-width:760px){ .grid{ grid-template-columns:1fr; } }
  .stage{ background:#fff; border:1px solid var(--steel); border-radius:14px;
    display:flex; align-items:center; justify-content:center; padding:2rem; min-height:320px; position:relative; }
  .stage.dark{ background:#000; }
  .toggle-bg{ position:absolute; top:10px; right:12px; font-size:12px; color:var(--iron);
    background:transparent; border:1px solid var(--steel); border-radius:7px; padding:4px 9px; cursor:pointer; }
  .stage.dark .toggle-bg{ color:var(--steel); border-color:#333; }
  .controls{ display:flex; flex-direction:column; gap:14px; }
  .ctrl{ display:flex; flex-direction:column; gap:5px; }
  .ctrl label{ font-size:12px; font-weight:500; color:#000; display:flex; justify-content:space-between; }
  .ctrl label .val{ color:var(--iron); font-weight:400; }
  select, input[type=range]{ width:100%; }
  select{ padding:6px 8px; border:1px solid var(--steel); border-radius:8px; background:#fff; color:#000; font:inherit; }
  .swatches{ display:flex; gap:7px; flex-wrap:wrap; }
  .swatches button{ width:24px; height:24px; padding:0; border-radius:50%; border:1px solid var(--steel); cursor:pointer; }
  .swatches button[aria-pressed=true]{ outline:2px solid #000; outline-offset:2px; }
  .config{ grid-column:1 / -1; margin-top:1.5rem; background:#fff; border:1px solid var(--steel);
    border-radius:12px; padding:14px 16px; }
  .config h2{ font-size:12px; text-transform:uppercase; letter-spacing:.04em; margin:0 0 8px; color:var(--iron); }
  .config code{ display:block; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12.5px; color:#000; word-break:break-all; }
  .copy{ margin-top:10px; font-size:12px; padding:6px 12px; border-radius:8px; border:0; background:var(--red); color:#fff; cursor:pointer; }
</style>
</head>
<body>
  <div class="page">
    <h1>Tiled globe loader — every option is a knob</h1>
    <div class="grid">
      <div class="controls">
        <div class="ctrl"><label for="origin">Empty corner</label>
          <select id="origin">
            <option value="top-right" selected>top-right</option>
            <option value="top-left">top-left</option>
            <option value="bottom-right">bottom-right</option>
            <option value="bottom-left">bottom-left</option>
          </select></div>
        <div class="ctrl"><label for="direction">Spin direction</label>
          <select id="direction">
            <option value="ccw" selected>counter-clockwise</option>
            <option value="cw">clockwise</option>
          </select></div>
        <div class="ctrl"><label for="tiles">Tiles (around equator) <span class="val" id="tilesV">24</span></label>
          <input type="range" id="tiles" min="8" max="40" step="2" value="24"></div>
        <div class="ctrl"><label for="speed">Speed <span class="val" id="speedV">1.0×</span></label>
          <input type="range" id="speed" min="0.2" max="2.6" step="0.1" value="1"></div>
        <div class="ctrl"><label for="empty">Empty size <span class="val" id="emptyV">0.50</span></label>
          <input type="range" id="empty" min="0.1" max="0.9" step="0.05" value="0.5"></div>
        <div class="ctrl"><label for="snap">Snap sharpness <span class="val" id="snapV">0.70</span></label>
          <input type="range" id="snap" min="0" max="1" step="0.05" value="0.7"></div>
        <div class="ctrl"><label for="scatter">Edge scatter <span class="val" id="scatterV">0.18</span></label>
          <input type="range" id="scatter" min="0" max="0.5" step="0.02" value="0.18"></div>
        <div class="ctrl"><label for="gap">Tile gap <span class="val" id="gapV">0.16</span></label>
          <input type="range" id="gap" min="0.02" max="0.4" step="0.02" value="0.16"></div>
        <div class="ctrl"><label for="tilt">Axis tilt <span class="val" id="tiltV">28°</span></label>
          <input type="range" id="tilt" min="0" max="45" step="1" value="28"></div>
        <div class="ctrl"><label for="roll">Roll <span class="val" id="rollV">22°</span></label>
          <input type="range" id="roll" min="-45" max="45" step="1" value="22"></div>
        <div class="ctrl"><label for="mode">Color mode</label>
          <select id="mode">
            <option value="solid" selected>solid</option>
            <option value="tartan">tartan threads</option>
          </select></div>
        <div class="ctrl"><label>Base color</label>
          <div class="swatches" id="swatches">
            <button data-c="#C41230" aria-pressed="true"  style="background:#C41230" title="Carnegie Red"></button>
            <button data-c="#FDB515" aria-pressed="false" style="background:#FDB515" title="Gold Thread"></button>
            <button data-c="#009647" aria-pressed="false" style="background:#009647" title="Green Thread"></button>
            <button data-c="#008F91" aria-pressed="false" style="background:#008F91" title="Teal Thread"></button>
            <button data-c="#007BC0" aria-pressed="false" style="background:#007BC0" title="Highlands Sky Blue"></button>
            <button data-c="#000000" aria-pressed="false" style="background:#000000" title="Black"></button>
          </div></div>
      </div>

      <div class="stage" id="stage">
        <button class="toggle-bg" id="bgToggle">dark bg</button>
        <canvas id="globe"></canvas>
      </div>

      <div class="config">
        <h2>Drop-in markup for this config</h2>
        <code id="config"></code>
        <button class="copy" id="copy">Copy</button>
      </div>
    </div>
  </div>

<script>
/* ============================================================
   TILED GLOBE LOADER — canvas, no dependencies
   Small ~square tiles on an angled globe, no graticule. Fill is
   a screen-space diagonal anchored to a chosen corner, so the
   empty/active corner and the spin direction are independent.
   CMU palette by default.
   Options (constructor or data-*):
     size, tiles, speed, direction(cw|ccw), origin(corner),
     tilt, roll, empty(0..1), snap(0..1), scatter(0..0.5),
     gap(0..0.4), mode(solid|tartan), accent(hex)
   ============================================================ */
(function(){
  var TWO=Math.PI*2, D2R=Math.PI/180;
  var CARNEGIE_RED=[196,18,48];
  var THREADS=[[253,181,21],[0,150,71],[0,143,145],[0,123,192],[239,58,71]];
  var THREAD_PROB=0.2;
  var CORNERS={ 'top-right':[0.7071,-0.7071],'top-left':[-0.7071,-0.7071],
                'bottom-right':[0.7071,0.7071],'bottom-left':[-0.7071,0.7071] };

  function smooth01(x){ return x<=0?0 : x>=1?1 : x*x*(3-2*x); }
  function hexToRgb(h){ h=String(h).replace('#',''); if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }

  function TiledGlobe(host, opts){
    this.canvas = host.tagName==='CANVAS' ? host : (function(){var c=document.createElement('canvas'); host.appendChild(c); return c;})();
    this.ctx=this.canvas.getContext('2d'); this.a=0; this._bn=null; this._bg=null;
    this.set(opts||{}, true);
    TiledGlobe._list.push(this);
  }
  TiledGlobe._list=[];

  TiledGlobe.prototype.set=function(o, force){
    o=o||{};
    if(!this.p){
      this.p=Object.assign({ size:120, tiles:24, speed:1, direction:'ccw', origin:'top-right',
        tilt:28, roll:22, empty:0.5, snap:0.7, scatter:0.18, gap:0.16, mode:'solid', accent:null }, o);
    } else { Object.assign(this.p, o); }
    var p=this.p;

    var dpr=Math.min(window.devicePixelRatio||1, 2);
    this.canvas.style.width=p.size+'px'; this.canvas.style.height=p.size+'px'; this.canvas.style.display='block';
    this.canvas.width=Math.round(p.size*dpr); this.canvas.height=Math.round(p.size*dpr);
    this.ctx.setTransform(dpr,0,0,dpr,0,0);

    this.cx=p.size/2; this.cy=p.size/2; this.R=p.size/2 - Math.max(2,p.size*0.04);
    this.cosT=Math.cos(p.tilt*D2R); this.sinT=Math.sin(p.tilt*D2R);
    this.cosR=Math.cos(p.roll*D2R); this.sinR=Math.sin(p.roll*D2R);
    this.dir=p.direction==='cw'?-1:1;
    this.u=CORNERS[p.origin]||CORNERS['top-right'];
    this.thr=1.2 - p.empty*1.9;
    this.edgeW=0.03 + (1-p.snap)*0.45;
    this.scatter=p.scatter;
    this.baseColor=p.accent?hexToRgb(p.accent):CARNEGIE_RED;

    if(force || this._bn!==p.tiles || this._bg!==p.gap){
      this.build(); this._bn=p.tiles; this._bg=p.gap;
    } else {
      this.recolor();
    }
  };

  TiledGlobe.prototype.build=function(){
    var p=this.p, baseN=p.tiles%2?p.tiles+1:p.tiles, inset=1-p.gap, SEG=3;
    var latStep=360/baseN, edges=[], l,b,c,s;
    for(l=-90; l<89.999; l+=latStep) edges.push(l);
    edges.push(90);
    var tiles=[];
    for(b=0;b<edges.length-1;b++){
      var la0=edges[b], la1=edges[b+1], latc=(la0+la1)/2;
      var cols=Math.max(1,Math.round(baseN*Math.cos(latc*D2R))), lonStep=360/cols;
      for(c=0;c<cols;c++){
        var lo0=c*lonStep, lo1=lo0+lonStep, lonc=(lo0+lo1)/2, edge=[];
        for(s=0;s<=SEG;s++) edge.push([la1, lo0+(lo1-lo0)*s/SEG]);
        for(s=1;s<=SEG;s++) edge.push([la1+(la0-la1)*s/SEG, lo1]);
        for(s=1;s<=SEG;s++) edge.push([la0, lo1+(lo0-lo1)*s/SEG]);
        for(s=1;s<SEG;s++)  edge.push([la0+(la1-la0)*s/SEG, lo0]);
        for(s=0;s<edge.length;s++){
          edge[s]=[ (latc+(edge[s][0]-latc)*inset)*D2R, (lonc+(edge[s][1]-lonc)*inset)*D2R ];
        }
        tiles.push({ b:edge, latc:latc*D2R, lonc:lonc*D2R,
          rnd:Math.random()*2-1, cr:Math.random(), ci:Math.random(), color:null });
      }
    }
    this.tiles=tiles; this.recolor();
  };

  TiledGlobe.prototype.recolor=function(){
    var p=this.p, t, i;
    for(i=0;i<this.tiles.length;i++){
      t=this.tiles[i];
      t.color=(p.mode==='tartan' && t.cr<THREAD_PROB) ? THREADS[(t.ci*THREADS.length)|0] : this.baseColor;
    }
  };

  TiledGlobe.prototype.proj=function(lat, lon){
    var le=lon + this.dir*this.a, cl=Math.cos(lat);
    var X=cl*Math.cos(le), Y=Math.sin(lat), Z=cl*Math.sin(le);
    var Y2=Y*this.cosT - Z*this.sinT, Z2=Y*this.sinT + Z*this.cosT;
    var ox=X*this.R, oy=-Y2*this.R;
    return { sx:this.cx+ox*this.cosR-oy*this.sinR, sy:this.cy+ox*this.sinR+oy*this.cosR, z:Z2 };
  };

  TiledGlobe.prototype.render=function(){
    var ctx=this.ctx, tiles=this.tiles, ux=this.u[0], uy=this.u[1], i,k;
    ctx.clearRect(0,0,this.p.size,this.p.size);
    for(i=0;i<tiles.length;i++){
      var t=tiles[i], pc=this.proj(t.latc,t.lonc);
      if(pc.z<=0.02) continue;
      var q=((pc.sx-this.cx)*ux + (pc.sy-this.cy)*uy)/this.R;
      var level=smooth01((this.thr - (q + t.rnd*this.scatter))/this.edgeW);
      if(level<0.02) continue;
      var limb=smooth01(pc.z/0.18), shade=0.88+0.12*pc.z, col=t.color;
      var alpha=level*limb*0.92;
      var bnd=t.b, p0=this.proj(bnd[0][0],bnd[0][1]);
      ctx.beginPath(); ctx.moveTo(p0.sx,p0.sy);
      for(k=1;k<bnd.length;k++){ var pp=this.proj(bnd[k][0],bnd[k][1]); ctx.lineTo(pp.sx,pp.sy); }
      ctx.closePath();
      ctx.fillStyle='rgba('+Math.round(col[0]*shade)+','+Math.round(col[1]*shade)+','+Math.round(col[2]*shade)+','+alpha.toFixed(3)+')';
      ctx.fill();
    }
  };

  TiledGlobe.prototype.step=function(dt){ this.a=(this.a+0.55*this.p.speed*dt)%TWO; this.render(); };

  var last=performance.now();
  (function loop(now){
    var dt=Math.min((now-last)/1000,0.05); last=now;
    for(var i=0;i<TiledGlobe._list.length;i++) TiledGlobe._list[i].step(dt);
    requestAnimationFrame(loop);
  })(last);

  window.TiledGlobe=TiledGlobe;

  /* ---------- playground wiring ---------- */
  var globe=new TiledGlobe(document.getElementById('globe'), { size:240 });
  function num(id){ return parseFloat(document.getElementById(id).value); }
  function val(id){ return document.getElementById(id).value; }

  function apply(){
    globe.set({
      origin:val('origin'), direction:val('direction'),
      tiles:num('tiles'), speed:num('speed'), empty:num('empty'),
      snap:num('snap'), scatter:num('scatter'), gap:num('gap'),
      tilt:num('tilt'), roll:num('roll'), mode:val('mode')
    }, false);
    updateLabels(); updateConfig();
  }
  function updateLabels(){
    document.getElementById('tilesV').textContent=num('tiles');
    document.getElementById('speedV').textContent=num('speed').toFixed(1)+'×';
    document.getElementById('emptyV').textContent=num('empty').toFixed(2);
    document.getElementById('snapV').textContent=num('snap').toFixed(2);
    document.getElementById('scatterV').textContent=num('scatter').toFixed(2);
    document.getElementById('gapV').textContent=num('gap').toFixed(2);
    document.getElementById('tiltV').textContent=num('tilt')+'\u00B0';
    document.getElementById('rollV').textContent=num('roll')+'\u00B0';
  }
  function updateConfig(){
    var p=globe.p, parts=['data-globe','data-size="96"'];
    parts.push('data-origin="'+p.origin+'"','data-direction="'+p.direction+'"','data-tiles="'+p.tiles+'"');
    if(p.speed!==1) parts.push('data-speed="'+p.speed+'"');
    parts.push('data-tilt="'+p.tilt+'"','data-roll="'+p.roll+'"','data-empty="'+p.empty+'"',
               'data-snap="'+p.snap+'"','data-scatter="'+p.scatter+'"','data-gap="'+p.gap+'"');
    if(p.mode!=='solid') parts.push('data-mode="'+p.mode+'"');
    if(p.accent) parts.push('data-accent="'+p.accent+'"');
    document.getElementById('config').textContent='<span '+parts.join(' ')+'></span>';
  }

  ['origin','direction','tiles','speed','empty','snap','scatter','gap','tilt','roll','mode']
    .forEach(function(id){ document.getElementById(id).addEventListener('input', apply); });

  document.getElementById('swatches').addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#swatches button').forEach(function(x){ x.setAttribute('aria-pressed', x===b); });
    globe.set({accent:b.dataset.c}, false); updateConfig();
  });
  document.getElementById('bgToggle').addEventListener('click', function(){
    var st=document.getElementById('stage'); st.classList.toggle('dark');
    this.textContent=st.classList.contains('dark')?'light bg':'dark bg';
  });
  document.getElementById('copy').addEventListener('click', function(){
    var txt=document.getElementById('config').textContent;
    if(navigator.clipboard) navigator.clipboard.writeText(txt);
    var b=this; b.textContent='Copied'; setTimeout(function(){ b.textContent='Copy'; },1200);
  });

  updateLabels(); updateConfig();
})();
</script>
</body>
</html>
